<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Silta — Your Mortgage Journey</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;700;800&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
  if (window.pdfjsLib) {
    window.pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  }
</script>
<style>
:root{
  --navy-900:#0E2238; --navy-800:#15304D; --navy-700:#1C3D60; --navy-600:#28547F;
  --blue-500:#4A7CA8; --blue-600:#3A6489; --blue-100:#E7F0F8;
  --green-700:#256E4C; --green-600:#2F8F62; --green-500:#3FA876; --green-100:#E5F6ED;
  --amber-600:#B9762A; --amber-100:#FBF0DF;
  --red-600:#C0443F; --red-100:#FBE9E8;
  --white:#FFFFFF;
  --gray-50:#F6F8FA; --gray-100:#EEF1F5; --gray-200:#E2E7ED; --gray-300:#CBD3DC;
  --gray-400:#A9B3BE; --gray-500:#8993A1; --gray-600:#5C6773; --gray-700:#414C58; --gray-800:#2A3441; --gray-900:#16202B;
  --radius-sm:8px; --radius-md:12px; --radius-lg:18px; --radius-xl:22px;
  --shadow-sm:0 1px 2px rgba(15,35,56,.07), 0 1px 1px rgba(15,35,56,.04);
  --shadow-md:0 10px 28px rgba(15,35,56,.09);
  --shadow-lg:0 20px 48px rgba(15,35,56,.14);
  --font-display:'Manrope',sans-serif; --font-body:'Inter',sans-serif; --font-mono:'IBM Plex Mono',monospace;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  font-family:var(--font-body); color:var(--gray-900); background:var(--gray-50);
  -webkit-font-smoothing:antialiased; font-size:14.5px; line-height:1.55;
}
button{font-family:inherit; cursor:pointer;}
input,select,textarea{font-family:inherit; font-size:14px;}
a{color:inherit;}
::selection{background:var(--green-100); color:var(--navy-900);}
.hidden{display:none !important;}
.icon{display:inline-block; vertical-align:middle; line-height:0;}
.icon svg{display:block;}

/* ---------- App shell ---------- */
#app{display:flex; min-height:100vh;}
.sidebar{
  width:248px; flex:0 0 248px; background:linear-gradient(180deg,var(--navy-900),var(--navy-800));
  color:var(--white); display:flex; flex-direction:column; padding:24px 16px; position:sticky; top:0; height:100vh;
}
.brand{display:flex; align-items:center; gap:10px; padding:6px 8px 26px 8px;}
.brand-mark{width:34px; height:34px; flex:0 0 34px;}
.brand-word{font-family:var(--font-display); font-weight:800; font-size:19px; letter-spacing:.2px; color:var(--white);}
.brand-sub{font-size:10.5px; color:var(--gray-400); letter-spacing:.4px; text-transform:uppercase; margin-top:1px;}

.nav{display:flex; flex-direction:column; gap:3px; margin-top:6px;}
.nav-item{
  display:flex; align-items:center; gap:11px; padding:10px 12px; border-radius:10px; color:#C7D3E0;
  font-weight:600; font-size:13.6px; border:none; background:transparent; text-align:left; width:100%; transition:background .15s,color .15s;
}
.nav-item .icon svg{stroke:#9DB0C4;}
.nav-item:hover{background:rgba(255,255,255,.06); color:var(--white);}
.nav-item.active{background:rgba(255,255,255,.12); color:var(--white);}
.nav-item.active .icon svg{stroke:var(--green-500);}
.nav-badge{margin-left:auto; background:var(--green-600); color:#fff; font-size:10px; font-weight:700; padding:2px 6px; border-radius:99px;}

.sidebar-spacer{flex:1;}
.hybrid-badge{
  display:flex; align-items:flex-start; gap:9px; background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.1);
  border-radius:var(--radius-md); padding:13px 12px; margin-bottom:12px;
}
.hybrid-badge .icon svg{stroke:var(--green-500);}
.hybrid-badge-title{font-size:12px; font-weight:700; color:var(--white);}
.hybrid-badge-text{font-size:11px; color:var(--gray-400); margin-top:2px; line-height:1.4;}
.sidebar-user{display:flex; align-items:center; gap:10px; padding:10px 8px; border-top:1px solid rgba(255,255,255,.08);}
.avatar-sm{width:32px; height:32px; border-radius:50%; background:var(--green-600); color:#fff; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:12px; flex:0 0 32px;}
.sidebar-user-name{font-size:12.5px; font-weight:600; color:var(--white);}
.sidebar-user-sub{font-size:11px; color:var(--gray-400);}

.main{flex:1; min-width:0; display:flex; flex-direction:column;}
.topbar{
  display:flex; align-items:center; justify-content:space-between; padding:18px 36px;
  border-bottom:1px solid var(--gray-200); background:var(--white); position:sticky; top:0; z-index:20;
}
.topbar-title{font-family:var(--font-display); font-weight:800; font-size:21px; color:var(--navy-900);}
.topbar-sub{font-size:12.5px; color:var(--gray-500); margin-top:2px;}
.topbar-right{display:flex; align-items:center; gap:10px;}

.content{padding:30px 36px 100px 36px; max-width:1180px; width:100%; margin:0 auto;}
.page{width:100%;}

/* ---------- Generic components ---------- */
.grid{display:grid; gap:20px;}
.grid-2{grid-template-columns:1.3fr 1fr;}
.grid-3{grid-template-columns:repeat(3,1fr);}
@media(max-width:980px){.grid-2,.grid-3{grid-template-columns:1fr;}}

.card{background:var(--white); border:1px solid var(--gray-200); border-radius:var(--radius-lg); padding:22px; box-shadow:var(--shadow-sm);}
.card-row{display:flex; align-items:center; justify-content:space-between; margin-bottom:14px;}
.card-title{font-family:var(--font-display); font-weight:800; font-size:14.5px; color:var(--navy-900); letter-spacing:.1px; display:flex; align-items:center; gap:8px;}
.card-title .icon svg{stroke:var(--blue-500);}
.card-desc{font-size:12.5px; color:var(--gray-500);}

.pill{display:inline-flex; align-items:center; gap:5px; font-size:11.5px; font-weight:700; padding:4px 10px; border-radius:99px; white-space:nowrap;}
.pill-success{background:var(--green-100); color:var(--green-700);}
.pill-warn{background:var(--amber-100); color:var(--amber-600);}
.pill-danger{background:var(--red-100); color:var(--red-600);}
.pill-info{background:var(--blue-100); color:var(--blue-600);}
.pill-neutral{background:var(--gray-100); color:var(--gray-600);}
.pill .icon svg{width:11px; height:11px;}

.btn{display:inline-flex; align-items:center; gap:7px; border-radius:10px; padding:10px 16px; font-weight:700; font-size:13px; border:1px solid transparent; transition:all .15s;}
.btn-primary{background:var(--navy-900); color:#fff;}
.btn-primary:hover{background:var(--navy-800);}
.btn-accent{background:var(--green-600); color:#fff;}
.btn-accent:hover{background:var(--green-700);}
.btn-outline{background:#fff; color:var(--navy-900); border-color:var(--gray-300);}
.btn-outline:hover{border-color:var(--navy-700); background:var(--gray-50);}
.btn-ghost{background:transparent; color:var(--gray-600); border-color:transparent;}
.btn-ghost:hover{background:var(--gray-100); color:var(--gray-900);}
.btn-sm{padding:7px 11px; font-size:12px; border-radius:8px;}
.btn:disabled{opacity:.45; cursor:not-allowed;}
.btn .icon svg{width:15px; height:15px;}

.divider{height:1px; background:var(--gray-200); margin:16px 0;}
.muted{color:var(--gray-500);}
.mono{font-family:var(--font-mono);}
.label-xs{font-size:10.5px; font-weight:700; text-transform:uppercase; letter-spacing:.5px; color:var(--gray-500);}

/* readiness ring */
.ring-wrap{position:relative; width:172px; height:172px; flex:0 0 172px;}
.ring-wrap svg{transform:rotate(-90deg);}
.ring-center{position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center;}
.ring-pct{font-family:var(--font-display); font-weight:800; font-size:36px; color:var(--navy-900); line-height:1;}
.ring-label{font-size:11px; color:var(--gray-500); margin-top:4px; text-align:center; max-width:110px;}

/* progress steps */
.steps{display:flex; flex-direction:column; gap:0;}
.step{display:flex; gap:12px; position:relative; padding-bottom:22px;}
.step:last-child{padding-bottom:0;}
.step-line{position:absolute; left:11px; top:24px; bottom:0; width:2px; background:var(--gray-200);}
.step:last-child .step-line{display:none;}
.step.done .step-line{background:var(--green-500);}
.step-dot{width:23px; height:23px; border-radius:50%; flex:0 0 23px; display:flex; align-items:center; justify-content:center; z-index:1; border:2px solid var(--gray-300); background:#fff;}
.step.done .step-dot{background:var(--green-500); border-color:var(--green-500);}
.step.current .step-dot{border-color:var(--blue-500); background:var(--blue-100);}
.step-dot .icon svg{width:13px; height:13px; stroke:#fff;}
.step-body{padding-top:1px;}
.step-title{font-weight:700; font-size:13.5px; color:var(--gray-800);}
.step.done .step-title{color:var(--navy-900);}
.step-note{font-size:11.5px; color:var(--gray-500); margin-top:1px;}

/* next steps */
.next-steps-card{background:linear-gradient(135deg,var(--navy-900),var(--navy-700)); border-radius:var(--radius-xl); padding:24px; color:#fff; box-shadow:var(--shadow-md);}
.next-steps-card .card-title{color:#fff; font-size:15px;}
.next-steps-card .card-title .icon svg{stroke:var(--green-500);}
.next-item{display:flex; align-items:flex-start; gap:12px; padding:12px 0; border-top:1px solid rgba(255,255,255,.1);}
.next-item:first-of-type{border-top:none;}
.next-num{width:24px; height:24px; border-radius:7px; background:rgba(255,255,255,.12); color:#fff; font-size:12px; font-weight:800; display:flex; align-items:center; justify-content:center; flex:0 0 24px; font-family:var(--font-mono);}
.next-text{font-size:13.3px; font-weight:600; color:#EDF2F8;}
.next-sub{font-size:11.5px; color:#B7C5D6; margin-top:2px;}
.next-action{margin-left:auto; flex:0 0 auto;}

/* doc list */
.doc-cat-title{display:flex; align-items:center; gap:9px; margin:26px 0 12px 0;}
.doc-cat-title:first-child{margin-top:0;}
.doc-cat-title .icon svg{stroke:var(--navy-700);}
.doc-cat-name{font-family:var(--font-display); font-weight:800; font-size:14px; color:var(--navy-900);}
.doc-cat-meta{font-size:11.5px; color:var(--gray-500); margin-left:auto;}

.doc-card{border:1px solid var(--gray-200); border-radius:var(--radius-md); padding:16px 18px; background:#fff; margin-bottom:12px;}
.doc-card-top{display:flex; align-items:center; gap:12px;}
.doc-icon{width:38px; height:38px; border-radius:10px; background:var(--blue-100); display:flex; align-items:center; justify-content:center; flex:0 0 38px;}
.doc-icon svg{stroke:var(--blue-600);}
.doc-name{font-weight:700; font-size:13.8px; color:var(--gray-900);}
.doc-file{font-size:11.5px; color:var(--gray-500); margin-top:1px; font-family:var(--font-mono);}
.doc-status{margin-left:auto;}
.doc-actions{display:flex; gap:8px; align-items:center;}
.doc-body{margin-top:13px;}
.dropzone{
  border:1.5px dashed var(--gray-300); border-radius:10px; padding:16px; display:flex; align-items:center; gap:12px;
  background:var(--gray-50); cursor:pointer; transition:border-color .15s, background .15s;
}
.dropzone:hover{border-color:var(--blue-500); background:var(--blue-100);}
.dropzone .icon svg{stroke:var(--blue-500);}
.dropzone-text{font-size:12.6px; font-weight:600; color:var(--gray-700);}
.dropzone-sub{font-size:11px; color:var(--gray-500);}
.scenario-row{display:flex; align-items:center; gap:8px; margin-top:10px;}
.scenario-row select{border:1px solid var(--gray-300); border-radius:7px; padding:5px 8px; font-size:11.5px; color:var(--gray-600); background:#fff;}
.scenario-row label{font-size:11px; color:var(--gray-500);}

.extract-grid{display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:12px; margin-top:13px; padding-top:13px; border-top:1px dashed var(--gray-200);}
.extract-item{}
.extract-label{font-size:10.5px; color:var(--gray-500); text-transform:uppercase; letter-spacing:.4px; font-weight:700;}
.extract-value{font-family:var(--font-mono); font-weight:600; font-size:14.5px; color:var(--navy-900); margin-top:2px;}

.issue-banner{display:flex; gap:10px; align-items:flex-start; background:var(--amber-100); border:1px solid #F0DCB8; border-radius:9px; padding:11px 13px; margin-top:12px; font-size:12.4px; color:#7A4E15;}
.issue-banner.danger{background:var(--red-100); border-color:#F0C9C7; color:#822B27;}
.issue-banner .icon svg{stroke:#B9762A; flex:0 0 16px; margin-top:1px;}
.issue-banner.danger .icon svg{stroke:#C0443F;}

.analyzing-row{display:flex; align-items:center; gap:10px; padding:13px 0; font-size:12.6px; color:var(--blue-600); font-weight:600;}
.spinner{width:15px; height:15px; border-radius:50%; border:2px solid var(--blue-100); border-top-color:var(--blue-500); animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* checklist */
.checklist-item{display:flex; align-items:center; gap:10px; padding:9px 0; border-bottom:1px solid var(--gray-100); font-size:13px;}
.checklist-item:last-child{border-bottom:none;}
.checklist-dot{width:18px; height:18px; border-radius:50%; display:flex; align-items:center; justify-content:center; flex:0 0 18px;}
.checklist-dot.ok{background:var(--green-500);}
.checklist-dot.warn{background:var(--amber-600);}
.checklist-dot .icon svg{width:11px; height:11px; stroke:#fff;}
.checklist-text{font-weight:600; color:var(--gray-800);}
.checklist-sub{margin-left:auto; font-size:11px; color:var(--gray-500);}

/* insights */
.insight-item{display:flex; gap:10px; padding:11px 0; border-bottom:1px solid var(--gray-100);}
.insight-item:last-child{border-bottom:none;}
.insight-dot{width:28px; height:28px; border-radius:8px; background:var(--green-100); display:flex; align-items:center; justify-content:center; flex:0 0 28px;}
.insight-dot .icon svg{stroke:var(--green-600); width:14px; height:14px;}
.insight-text{font-size:12.6px; color:var(--gray-800); line-height:1.45;}
.insight-time{font-size:10.8px; color:var(--gray-400); margin-top:2px;}

/* advisor card */
.advisor-card{display:flex; gap:13px; align-items:flex-start;}
.advisor-avatar{width:46px; height:46px; border-radius:50%; background:var(--navy-700); color:#fff; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:15px; flex:0 0 46px;}
.advisor-name{font-weight:700; font-size:14px; color:var(--navy-900);}
.advisor-role{font-size:11.5px; color:var(--gray-500);}
.advisor-actions{display:flex; gap:8px; margin-top:11px; flex-wrap:wrap;}

/* ---------- Chat / Assistant ---------- */
.assistant-shell{display:grid; grid-template-columns:1fr 280px; gap:20px; height:calc(100vh - 175px); min-height:520px;}
@media(max-width:980px){.assistant-shell{grid-template-columns:1fr; height:auto;}}
.chat-panel{display:flex; flex-direction:column; background:#fff; border:1px solid var(--gray-200); border-radius:var(--radius-lg); box-shadow:var(--shadow-sm); overflow:hidden;}
.chat-header{display:flex; align-items:center; gap:11px; padding:16px 20px; border-bottom:1px solid var(--gray-200);}
.silta-mark{width:36px; height:36px; border-radius:10px; background:var(--navy-900); display:flex; align-items:center; justify-content:center; flex:0 0 36px;}
.silta-mark svg{stroke:var(--green-500);}
.chat-header-name{font-family:var(--font-display); font-weight:800; font-size:14.5px; color:var(--navy-900);}
.chat-header-sub{font-size:11px; color:var(--green-600); font-weight:600; display:flex; align-items:center; gap:5px;}
.chat-header-sub .dot{width:6px; height:6px; border-radius:50%; background:var(--green-500); display:inline-block;}
.chat-header-actions{margin-left:auto; display:flex; gap:6px;}

.chat-messages{flex:1; overflow-y:auto; padding:22px 22px 6px 22px; display:flex; flex-direction:column; gap:16px;}
.msg-row{display:flex; gap:10px; max-width:86%;}
.msg-row.user{align-self:flex-end; flex-direction:row-reverse;}
.msg-row.assistant{align-self:flex-start;}
.msg-avatar{width:28px; height:28px; border-radius:50%; flex:0 0 28px; display:flex; align-items:center; justify-content:center;}
.msg-row.assistant .msg-avatar{background:var(--navy-900);}
.msg-row.assistant .msg-avatar svg{stroke:var(--green-500); width:14px; height:14px;}
.msg-row.user .msg-avatar{background:var(--blue-500); color:#fff; font-size:11px; font-weight:700;}
.msg-col{display:flex; flex-direction:column; gap:4px;}
.msg-row.user .msg-col{align-items:flex-end;}
.bubble{padding:11px 14px; border-radius:14px; font-size:13.4px; line-height:1.55;}
.msg-row.assistant .bubble{background:var(--gray-50); border:1px solid var(--gray-200); color:var(--gray-900); border-top-left-radius:4px;}
.msg-row.assistant .bubble.proactive{background:var(--green-100); border-color:#CDEBDC;}
.msg-row.user .bubble{background:var(--navy-900); color:#fff; border-top-right-radius:4px;}
.msg-meta{display:flex; align-items:center; gap:8px; font-size:10.5px; color:var(--gray-400); padding:0 3px;}
.msg-row.user .msg-meta{flex-direction:row-reverse;}
.copy-btn{background:none; border:none; color:var(--gray-400); font-size:10.5px; display:flex; align-items:center; gap:3px; padding:2px;}
.copy-btn:hover{color:var(--gray-700);}
.copy-btn .icon svg{width:11px; height:11px;}
.advisor-suggest{margin-top:7px;}
.advisor-suggest button{font-size:11.5px;}

.typing-row{align-self:flex-start; display:flex; gap:10px;}
.typing-bubble{background:var(--gray-50); border:1px solid var(--gray-200); border-radius:14px; border-top-left-radius:4px; padding:13px 16px; display:flex; gap:4px;}
.typing-bubble span{width:6px; height:6px; border-radius:50%; background:var(--gray-400); display:inline-block; animation:bounce 1.2s infinite;}
.typing-bubble span:nth-child(2){animation-delay:.15s;} .typing-bubble span:nth-child(3){animation-delay:.3s;}
@keyframes bounce{0%,60%,100%{transform:translateY(0); opacity:.5;} 30%{transform:translateY(-4px); opacity:1;}}

.suggest-row{display:flex; gap:8px; flex-wrap:wrap; padding:4px 22px 16px 22px;}
.chip{background:#fff; border:1px solid var(--gray-300); color:var(--navy-800); font-size:12px; font-weight:600; padding:7px 12px; border-radius:99px; transition:all .15s;}
.chip:hover{border-color:var(--blue-500); background:var(--blue-100);}

.chat-input-bar{display:flex; gap:10px; align-items:flex-end; padding:14px 18px; border-top:1px solid var(--gray-200); background:#fff;}
.chat-input-bar textarea{
  flex:1; resize:none; border:1px solid var(--gray-300); border-radius:12px; padding:11px 14px; font-size:13.6px; max-height:120px;
  outline:none; transition:border-color .15s;
}
.chat-input-bar textarea:focus{border-color:var(--blue-500);}
.send-btn{width:42px; height:42px; border-radius:11px; background:var(--navy-900); border:none; color:#fff; display:flex; align-items:center; justify-content:center; flex:0 0 42px;}
.send-btn:hover{background:var(--navy-800);}
.send-btn:disabled{opacity:.4;}
.send-btn .icon svg{stroke:#fff; width:17px; height:17px;}

.context-panel{display:flex; flex-direction:column; gap:14px; overflow-y:auto;}
.ctx-card{background:#fff; border:1px solid var(--gray-200); border-radius:var(--radius-md); padding:16px;}
.ctx-title{font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.4px; color:var(--gray-500); margin-bottom:10px;}
.ctx-row{display:flex; justify-content:space-between; font-size:12.4px; padding:5px 0; border-bottom:1px solid var(--gray-100);}
.ctx-row:last-child{border-bottom:none;}
.ctx-row span:first-child{color:var(--gray-500);}
.ctx-row span:last-child{font-weight:700; color:var(--gray-900); font-family:var(--font-mono);}

/* ---------- Forms (Profile) ---------- */
.form-section{margin-bottom:8px;}
.form-section-title{font-family:var(--font-display); font-weight:800; font-size:14.5px; color:var(--navy-900); margin-bottom:3px; display:flex; align-items:center; gap:8px;}
.form-section-title .icon svg{stroke:var(--blue-500);}
.form-section-desc{font-size:12px; color:var(--gray-500); margin-bottom:14px;}
.form-grid{display:grid; grid-template-columns:1fr 1fr; gap:14px;}
@media(max-width:700px){.form-grid{grid-template-columns:1fr;}}
.field{display:flex; flex-direction:column; gap:5px;}
.field label{font-size:12px; font-weight:700; color:var(--gray-700);}
.field input, .field select{
  border:1px solid var(--gray-300); border-radius:9px; padding:10px 12px; font-size:13.4px; outline:none; background:#fff; color:var(--gray-900);
  transition:border-color .15s;
}
.field input:focus, .field select:focus{border-color:var(--blue-500);}
.field-span2{grid-column:span 2;}
@media(max-width:700px){.field-span2{grid-column:span 1;}}

/* toast */
#toastContainer{position:fixed; bottom:26px; left:50%; transform:translateX(-50%); z-index:200; display:flex; flex-direction:column; gap:8px; align-items:center;}
.toast{background:var(--navy-900); color:#fff; padding:11px 18px; border-radius:10px; font-size:12.8px; font-weight:600; box-shadow:var(--shadow-lg); display:flex; align-items:center; gap:8px; animation:toastIn .2s ease;}
.toast .icon svg{stroke:var(--green-500); width:15px; height:15px;}
@keyframes toastIn{from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:translateY(0);}}

/* floating assistant button */
.fab{
  position:fixed; bottom:26px; right:30px; width:58px; height:58px; border-radius:50%; background:var(--navy-900);
  display:flex; align-items:center; justify-content:center; border:none; box-shadow:var(--shadow-lg); z-index:150; transition:transform .15s;
}
.fab:hover{transform:translateY(-2px) scale(1.03);}
.fab .icon svg{stroke:var(--green-500); width:24px; height:24px;}
.fab-dot{position:absolute; top:9px; right:9px; width:10px; height:10px; border-radius:50%; background:var(--green-500); border:2px solid var(--navy-900);}

/* modal */
.modal-overlay{position:fixed; inset:0; background:rgba(14,34,56,.45); display:flex; align-items:center; justify-content:center; z-index:300; padding:20px;}
.modal{background:#fff; border-radius:var(--radius-lg); padding:24px; width:100%; max-width:440px; box-shadow:var(--shadow-lg);}
.modal-title{font-family:var(--font-display); font-weight:800; font-size:16px; color:var(--navy-900); display:flex; align-items:center; gap:9px;}
.modal-sub{font-size:12.4px; color:var(--gray-500); margin-top:4px; margin-bottom:16px;}
.modal textarea{width:100%; border:1px solid var(--gray-300); border-radius:10px; padding:11px 13px; font-size:13.4px; resize:vertical; min-height:90px; outline:none;}
.modal textarea:focus{border-color:var(--blue-500);}
.modal-actions{display:flex; gap:9px; margin-top:16px; flex-wrap:wrap;}
.modal-close{position:absolute; top:16px; right:16px;}

@media(max-width:760px){
  .sidebar{display:none;}
  .content{padding:20px 16px 90px 16px;}
  .topbar{padding:14px 18px;}
}

/* =========================================================================
   KNOWLEDGE BASE — 50+ structured mortgage FAQ entries (used for retrieval)
   ========================================================================= */
const KB = [
{c:'basics', q:'What is a mortgage?', a:'A mortgage is a loan used to purchase a property, where the property itself serves as collateral for the lender. You repay the loan over an agreed term, typically 20 to 30 years, through monthly instalments that include interest and, depending on the mortgage type, repayment of the principal.', t:['mortgage','basics','definition']},
{c:'basics', q:'What do key mortgage terms like principal, interest and term mean?', a:'The principal is the amount you borrow. Interest is the cost charged by the lender for borrowing that amount. The term is the agreed duration of the loan, and the interest rate period is how long your interest rate stays fixed before it can change.', t:['terminology','principal','interest','term']},
{c:'basics', q:'What is NHG (Nationale Hypotheek Garantie)?', a:'NHG is a Dutch national mortgage guarantee scheme available for mortgages up to a set value limit. It can offer more favourable interest rates and added protection in specific circumstances, such as job loss or relationship breakdown, subject to its own conditions.', t:['nhg','guarantee','basics']},
{c:'basics', q:'What does loan-to-value (LTV) mean?', a:'Loan-to-value compares the mortgage amount to the value of the property. A lower LTV generally means you are borrowing a smaller proportion of the property value, which can affect the interest rate offered and the overall risk profile of the loan.', t:['ltv','loan-to-value','basics']},
{c:'basics', q:'Should I rent or buy a home?', a:'This depends on your financial stability, how long you plan to stay in one place, current savings, and local market conditions. Silta can help you understand the mortgage side of buying, but this is a personal decision your advisor can help you think through in detail.', t:['rent','buy','basics']},
{c:'basics', q:'What does a mortgage advisor do?', a:'A mortgage advisor reviews your complete financial situation, validates the information gathered during your application, explains your options in detail, and provides the final recommendation and formal advice required before a mortgage offer is issued.', t:['advisor','role','basics']},
{c:'basics', q:'What is a mortgage offer (hypotheekofferte)?', a:'A mortgage offer is a formal, binding proposal from a lender that sets out the loan amount, interest rate, term and conditions. It is issued after your application, documents and advisor review have been completed.', t:['offer','basics']},
{c:'basics', q:'What is the difference between gross and net monthly mortgage cost?', a:'The gross monthly cost is your mortgage payment before any tax relief is applied. The net monthly cost reflects what you actually pay after applicable tax benefits, such as mortgage interest deduction, are taken into account.', t:['gross','net','cost','basics']},

{c:'products', q:'What is an annuity mortgage?', a:'An annuity mortgage keeps your gross monthly payment relatively stable throughout the term. In the early years, a larger portion of the payment covers interest, and over time, a larger portion goes toward repaying the principal.', t:['annuity','products']},
{c:'products', q:'What is a linear mortgage?', a:'A linear mortgage repays the same amount of principal every month, so the loan balance decreases steadily. Because interest is calculated on a shrinking balance, monthly payments start higher and gradually decrease over the term.', t:['linear','products']},
{c:'products', q:'What is an interest-only mortgage?', a:'With an interest-only mortgage, your monthly payments cover only the interest, not the principal. This typically results in lower monthly costs, but the original loan amount remains unchanged unless repaid separately or at the end of the term.', t:['interest-only','products']},
{c:'products', q:'What is a fixed interest rate period?', a:'A fixed interest rate period locks in your interest rate for an agreed number of years, giving you predictable monthly payments during that period regardless of how market rates move.', t:['fixed','rate','products']},
{c:'products', q:'What is a variable interest rate?', a:'A variable interest rate can move up or down in line with market conditions, which means your monthly payments may change over time. It can offer flexibility but carries more uncertainty than a fixed rate.', t:['variable','rate','products']},
{c:'products', q:'Can I combine different mortgage types?', a:'Yes, many lenders allow a mortgage to be split into separate parts, each with a different structure or interest rate period. This can help balance predictability with flexibility, and your advisor can help assess whether this suits your situation.', t:['combine','products']},
{c:'products', q:'What is a bridging loan (overbruggingskrediet)?', a:'A bridging loan is short-term financing that helps cover the gap when you purchase a new home before your current one has been sold, using the expected equity from your existing property.', t:['bridging','products']},
{c:'products', q:'What are the benefits of an NHG-backed mortgage?', a:'NHG-backed mortgages can come with a reduced interest rate compared to non-NHG mortgages of the same type, along with additional safeguards in specific situations, subject to the scheme rules and value limits.', t:['nhg','products','benefits']},

{c:'process', q:'What are the steps in a mortgage application?', a:'A typical journey includes starting your application, uploading the required documents, completing AI-assisted review and completeness checks, advisor review and validation, and finally receiving a formal mortgage offer.', t:['process','steps','application']},
{c:'process', q:'How does document verification work?', a:'Each uploaded document is checked for relevance, completeness, and validity period. Silta highlights anything that looks missing, outdated, duplicated, or unclear, so it can be corrected before your advisor reviews your file.', t:['verification','documents','process']},
{c:'process', q:'What does the AI review check?', a:'The AI review checks that your uploaded documents are the right type, recent enough, complete, and consistent with each other. It also extracts key details like income and savings to help track your application readiness.', t:['ai review','process']},
{c:'process', q:'What happens during advisor review?', a:'Your assigned mortgage advisor reviews your complete file, validates the information gathered, considers your personal circumstances, and prepares the formal advice and recommendation required before an offer can be made.', t:['advisor review','process']},
{c:'process', q:'What happens after advisor review?', a:'Once your advisor has completed their review and the recommendation is finalised, your file proceeds toward a formal mortgage offer from the lender, which you can then review and accept.', t:['after review','process']},
{c:'process', q:'What is involved in receiving a final mortgage offer?', a:'A final mortgage offer is issued by the lender once your advisor has completed their review. It sets out the agreed loan amount, rate, and conditions, and is a formal step outside of Silta\'s AI-assisted guidance.', t:['final offer','process']},
{c:'process', q:'What role does a notary play?', a:'A notary handles the legal transfer of property ownership and registers the mortgage. They finalise the transaction after your mortgage offer has been accepted.', t:['notary','process']},
{c:'process', q:'How long does the mortgage process typically take?', a:'Timelines vary based on document readiness and individual circumstances, but having a complete, verified application before advisor review generally helps the process move more smoothly.', t:['timeline','process']},

{c:'documents', q:'Why do I need to upload salary slips?', a:'Salary slips help verify your current income, which is one of the central factors used to assess affordability. Recent salary slips are required so the figures reflect your current financial situation.', t:['salary slips','documents']},
{c:'documents', q:'Why is an employment contract required?', a:'An employment contract confirms your employment type and stability, such as whether you have a permanent or temporary contract, which affects how your income is assessed.', t:['employment contract','documents']},
{c:'documents', q:'What bank statements are needed?', a:'Lenders typically request recent bank statements, usually covering the last few months, to verify your account activity, income deposits, and overall financial behaviour.', t:['bank statements','documents']},
{c:'documents', q:'What is a savings statement and why is it required?', a:'A savings statement shows your current savings balance and is used to confirm you have sufficient funds for costs such as the down payment or other purchase-related expenses.', t:['savings','documents']},
{c:'documents', q:'What identification documents are accepted?', a:'A valid passport or national ID card is accepted to confirm your identity as part of the application process.', t:['identity','id','documents']},
{c:'documents', q:'What documents do self-employed applicants need?', a:'Self-employed applicants are typically asked for annual accounts, recent tax returns, and business financial statements instead of salary slips and an employment contract, since these better reflect business income.', t:['self-employed','documents']},
{c:'documents', q:'Do I need to report student debt?', a:'Yes, student debt should be reported, as it is generally factored into affordability calculations even if monthly repayments are currently low or deferred.', t:['student debt','documents']},
{c:'documents', q:'Do I need to report personal loans?', a:'Yes, any outstanding personal loans or other credit obligations should be reported, as they affect your overall debt position and borrowing capacity.', t:['personal loans','documents']},
{c:'documents', q:'How recent do my documents need to be?', a:'Most income-related documents, such as salary slips, need to fall within a standard recent verification period, generally the last one to three months, to be considered current.', t:['validity','recent','documents']},
{c:'documents', q:'What if I have additional income sources?', a:'Additional income, such as bonuses, freelance work, or rental income, can usually be considered, but generally needs separate supporting documentation and is reviewed individually by your advisor.', t:['additional income','documents']},

{c:'affordability', q:'How does income affect how much I can borrow?', a:'Your income is one of the main factors used to estimate borrowing capacity. Generally, stable and verifiable income supports a higher maximum loan amount, within lender affordability guidelines.', t:['income','affordability']},
{c:'affordability', q:'How do savings affect my mortgage application?', a:'Savings are typically used to cover the down payment and purchase-related costs. Having sufficient verified savings can strengthen your overall application.', t:['savings','affordability']},
{c:'affordability', q:'How does existing debt affect affordability?', a:'Existing debt, such as student loans or personal loans, is factored into affordability calculations because it affects how much of your income is available for mortgage repayments.', t:['debt','affordability']},
{c:'affordability', q:'Why does employment stability matter?', a:'Stable employment, particularly a permanent contract, generally provides more confidence in continued income, which lenders consider when assessing affordability.', t:['employment stability','affordability']},
{c:'affordability', q:'What if I have a temporary employment contract?', a:'A temporary contract can still be considered, especially with a relevant employer statement confirming continuation, but it may be reviewed more closely by your advisor as part of the affordability assessment.', t:['temporary contract','affordability']},
{c:'affordability', q:'How does a partner\'s income factor in?', a:'If you are applying together, both incomes are typically combined for affordability purposes, subject to each applicant\'s documentation being verified.', t:['partner','joint income','affordability']},
{c:'affordability', q:'What factors go into an affordability calculation?', a:'Affordability generally considers income, existing debt, savings, employment stability, the property value, and current lending standards. Your advisor reviews these together to form a complete picture.', t:['affordability','calculation']},
{c:'affordability', q:'How does student debt affect borrowing capacity?', a:'Student debt is factored into affordability calculations, generally reducing the amount you can borrow somewhat, even when current repayments are low.', t:['student debt','affordability']},
{c:'affordability', q:'What happens if my affordability looks borderline?', a:'If your situation is borderline, your advisor will look closely at your complete financial picture, and may discuss adjustments such as a different mortgage type, additional savings, or a revised property budget.', t:['borderline','affordability']},
{c:'affordability', q:'How does my advisor refine the affordability assessment?', a:'Your advisor reviews verified documents, your full financial picture, and lender criteria together, going beyond the indicative information Silta\'s AI can provide, to reach a formal recommendation.', t:['advisor','affordability']},

{c:'platform', q:'How does Silta\'s AI assistant work?', a:'Silta\'s assistant combines a mortgage knowledge base, your uploaded documents, your profile information, and your conversation history to give grounded, personalised guidance, while leaving final decisions to your mortgage advisor.', t:['silta','ai','platform']},
{c:'platform', q:'What is the hybrid AI-human model?', a:'Silta uses AI to handle guidance, education, document checks, and readiness tracking, while your human mortgage advisor remains responsible for final review, validation, and any formal mortgage recommendation.', t:['hybrid','platform']},
{c:'platform', q:'Is my document data kept secure?', a:'Documents you upload are used only to support your mortgage application and readiness tracking within Silta, and are reviewed by your advisor as part of the formal process.', t:['security','privacy','platform']},
{c:'platform', q:'Can the AI approve my mortgage?', a:'No. Silta\'s AI assistant cannot approve a mortgage or guarantee a specific outcome. It provides guidance based on the information currently available, and your advisor handles final review and approval-related decisions.', t:['approval','ai limits','platform']},
{c:'platform', q:'When should I contact my mortgage advisor directly?', a:'It is a good idea to contact your advisor directly for complex personal circumstances, final decisions, or anything Silta suggests may need personalised advice beyond general guidance.', t:['advisor','contact','platform']},
{c:'platform', q:'What does my readiness score mean?', a:'Your readiness score reflects how complete and verified your application currently is, based on your profile and uploaded documents. A higher score means your file is closer to being ready for advisor review.', t:['readiness score','platform']}
];

function uid(){ return 'id'+Math.random().toString(36).slice(2,10)+Date.now().toString(36); }
function fmtMoney(n){ if(n===null||n===undefined||n==='') return '—'; return '€'+Number(n).toLocaleString('en-US'); }
function fmtTime(d){ return new Date(d).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}); }
function fmtTimeAgo(d){
  const diff = Math.floor((Date.now()-new Date(d).getTime())/1000);
  if(diff<60) return 'Just now';
  if(diff<3600) return Math.floor(diff/60)+'m ago';
  if(diff<86400) return Math.floor(diff/3600)+'h ago';
  return Math.floor(diff/86400)+'d ago';
}

/* =========================================================================
   DOCUMENT / EMPLOYMENT HELPERS
   ========================================================================= */
function employmentDocIds(){
  return state.profile.employmentStatus==='self_employed'
    ? ['annual_accounts','tax_returns','business_financials']
    : ['salary_slips','employment_contract'];
}
function activeDocIds(){
  const all = Object.keys(DOC_META);
  const emp = employmentDocIds();
  return all.filter(id=> DOC_META[id].category!=='employment' || emp.includes(id));
}
function requiredDocIds(){
  return activeDocIds().filter(id=>DOC_META[id].required);
}
function docVerified(id){ return state.documents[id] && state.documents[id].status==='verified'; }
function hasAnyIssue(){ return activeDocIds().some(id=> ISSUE_STATUSES.includes(state.documents[id].status)); }
function missingRequiredDocs(){ return requiredDocIds().filter(id=> state.documents[id].status==='missing'); }
function issueDocs(){ return activeDocIds().filter(id=> ISSUE_STATUSES.includes(state.documents[id].status)); }

function isProfileComplete(){
  const p = state.profile;
  const baseOk = p.firstName && p.lastName && p.email && p.phone && p.targetPropertyValue && p.desiredMonthlyPayment && p.housingType;
  const empOk = p.employmentStatus==='self_employed' ? true : !!p.employer;
  return !!(baseOk && empOk);
}

function computeReadiness(){
  let score = 0;
  if(isProfileComplete()) score+=10;
  if(state.profile.employmentStatus==='self_employed'){
    if(docVerified('annual_accounts') && docVerified('tax_returns')) score+=10;
    if(docVerified('business_financials')) score+=20;
  } else {
    if(docVerified('salary_slips')) score+=20;
    if(docVerified('employment_contract')) score+=20;
  }
  if(docVerified('bank_statements')) score+=20;
  if(docVerified('savings_statement')) score+=10;
  if(docVerified('identity_document')) score+=10;
  const anyUploaded = requiredDocIds().some(id=> state.documents[id].status!=='missing');
  if(anyUploaded && !hasAnyIssue()) score+=10;
  return Math.min(100, score);
}

function applicationStatusLabel(){
  const r = computeReadiness();
  const missing = missingRequiredDocs();
  if(state.advisorReviewRequested) return 'In Advisor Review';
  if(r>=90 && missing.length===0 && !hasAnyIssue()) return 'Ready for Advisor Review';
  if(r>=50) return 'In Progress';
  if(r>0) return 'Getting Started';
  return 'Not Started';
}

function progressSteps(){
  const req = requiredDocIds();
  const anyAnalyzing = req.some(id=> state.documents[id].status==='analyzing');
  const allUploaded = req.every(id=> state.documents[id].status!=='missing');
  const r = computeReadiness();
  const steps = [
    {title:'Application Started', done:true},
    {title:'Documents Uploaded', done: allUploaded},
    {title:'AI Review Complete', done: allUploaded && !anyAnalyzing},
    {title:'Ready For Advisor Review', done: r>=90 && missingRequiredDocs().length===0 && !hasAnyIssue()},
    {title:'Advisor Review', done: state.advisorReviewRequested},
    {title:'Final Offer', done:false}
  ];
  let currentSet=false;
  steps.forEach(s=>{ if(!s.done && !currentSet){ s.current=true; currentSet=true; } });
  return steps;
}

function nextSteps(){
  const items = [];
  if(!isProfileComplete()) items.push({text:'Complete your profile information', sub:'Helps Silta personalize guidance and confirm affordability basics.', action:"navigate('profile')", actionLabel:'Go to profile'});
  missingRequiredDocs().slice(0,3).forEach(id=>{
    items.push({text:'Upload '+DOC_META[id].label, sub:DOC_META[id].desc, action:"navigate('documents')", actionLabel:'Upload'});
  });
  issueDocs().slice(0,2).forEach(id=>{
    items.push({text:'Resolve issue with '+DOC_META[id].label, sub:STATUS_META[state.documents[id].status].label+' — review and re-upload.', action:"navigate('documents')", actionLabel:'Review'});
  });
  const r = computeReadiness();
  if(items.length===0 && r>=90 && !state.advisorReviewRequested){
    items.push({text:'Request advisor review', sub:'Your application looks complete and ready for human review.', action:"requestAdvisorReview()", actionLabel:'Request'});
  }
  if(items.length<3){
    items.push({text:'Ask Silta about mortgage options', sub:'Get personalized guidance based on your profile and documents.', action:"navigate('assistant')", actionLabel:'Ask Silta'});
  }
  items.push({text:'Contact your mortgage advisor', sub:'Send a message or request a callback any time.', action:"openAdvisorModal()", actionLabel:'Contact'});
  return items.slice(0,5);
}

function pushInsight(text){
  state.insights.unshift({id:uid(), text, time:new Date()});
  state.insights = state.insights.slice(0,8);
}
function pushProactive(text){
  pushInsight(text);
  state.conversation.push({id:uid(), role:'assistant', content:text, time:new Date(), proactive:true});
}

  const color = pct>=80? '#3FA876' : pct>=50? '#4A7CA8' : '#B9762A';
  return '<svg width="'+size+'" height="'+size+'" viewBox="0 0 '+size+' '+size+'">'
    +'<circle cx="'+size/2+'" cy="'+size/2+'" r="'+r+'" stroke="#EEF1F5" stroke-width="'+stroke+'" fill="none"/>'
    +'<circle cx="'+size/2+'" cy="'+size/2+'" r="'+r+'" stroke="'+color+'" stroke-width="'+stroke+'" fill="none" stroke-linecap="round" stroke-dasharray="'+c+'" stroke-dashoffset="'+offset+'" style="transition:stroke-dashoffset .6s ease"/>'

// Read text content from a PDF file using PDF.js (returns '' if not a readable PDF)
async function readPdfText(file){
  try{
    if(!window.pdfjsLib) return '';
    if(!/\.pdf$/i.test(file.name) && file.type!=='application/pdf') return '';
    const buf = await file.arrayBuffer();
    const pdf = await window.pdfjsLib.getDocument({data:buf}).promise;
    let text='';
    const maxPages = Math.min(pdf.numPages, 5);
    for(let p=1;p<=maxPages;p++){
      const page = await pdf.getPage(p);
      const content = await page.getTextContent();
      text += content.items.map(it=>it.str).join(' ')+'\n';
    }
    return text;
  }catch(e){
    return '';
  }
}

// Parse meaningful values out of raw document text. Returns an object of found fields.
function parseDocumentContent(docId, text){
  if(!text || text.length<20) return {found:{}, hasText:false};
  const t = text.replace(/\u00a0/g,' ');
  const found = {};

  // ── Money amounts: € 4.250,00 / EUR 4250 / 4,250.00 ───────────────────────
  function parseEuroAmounts(){
    const amts = [];
    const re = /(?:€|eur)\s*([\d.,]+)/gi;
    let m;
    while((m=re.exec(t))!==null){
      let raw = m[1];
      // Normalise: handle both 4.250,00 (NL) and 4,250.00 (EN)
      let val;
      if(/,\d{2}$/.test(raw)){ // ends with ,dd → NL decimal
        val = parseFloat(raw.replace(/\./g,'').replace(',','.'));
      } else if(/\.\d{2}$/.test(raw)){ // ends with .dd → EN decimal
        val = parseFloat(raw.replace(/,/g,''));
      } else {
        val = parseFloat(raw.replace(/[.,]/g,''));
      }
      if(!isNaN(val) && val>0 && val<100000000) amts.push(val);
    }
    return amts;
  }
  const amounts = parseEuroAmounts();

  // ── Employer / company (looks for "BV", "B.V.", or labelled fields) ───────
  function findEmployer(){
    let m = t.match(/(?:employer|werkgever|company|bedrijf)\s*[:\-]?\s*([A-Z][A-Za-z0-9&.\- ]{2,40}?(?:B\.?V\.?|N\.?V\.?|BV|NV|Ltd|GmbH|Inc))/);
    if(m) return m[1].trim();
    m = t.match(/\b([A-Z][A-Za-z0-9&.\- ]{2,40}?\s+B\.?V\.?)\b/);
    if(m) return m[1].trim();
    return null;
  }

  // ── IBAN ──────────────────────────────────────────────────────────────────
  function findIBAN(){
    const m = t.match(/\bNL\d{2}\s?[A-Z]{4}\s?\d{4}\s?\d{4}\s?\d{0,2}\b/);
    return m ? m[0].replace(/\s+/g,' ').trim() : null;
  }

  // ── Labelled value: "Net pay 3.182,00" / "Netto 3182" ────────────────────
  function findLabeled(labels){
    for(const lab of labels){
      // Require a € sign OR a properly-formatted amount (with decimals or thousands sep)
      // within a short window after the label. Avoids grabbing stray digits like dates.
      const re = new RegExp(lab+'[\\s\\S]{0,40}?(?:€|eur)\\s*([\\d.,]+\\d)','i');
      let m = t.match(re);
      if(!m){
        const re2 = new RegExp(lab+'[^\\dA-Za-z]{0,6}([\\d]{1,3}(?:[.,]\\d{3})+(?:[.,]\\d{2})?)','i');
        m = t.match(re2);
      }
      if(m){
        let raw=m[1], val;
        if(/,\d{2}$/.test(raw)) val=parseFloat(raw.replace(/\./g,'').replace(',','.'));
        else if(/\.\d{2}$/.test(raw)) val=parseFloat(raw.replace(/,/g,''));
        else val=parseFloat(raw.replace(/[.,]/g,''));
        if(!isNaN(val)&&val>0) return val;
      }
    }
    return null;
  }

  // ── Date / period ─────────────────────────────────────────────────────────
  function findPeriod(){
    let m = t.match(/\b(jan|feb|mar|apr|may|jun|jul|aug|sep|oct|nov|dec|maart|mei|okt)[a-z]*\.?\s*20\d{2}\b/i);
    if(m) return m[0];
    m = t.match(/\b20\d{2}-\d{2}-\d{2}\b/);
    if(m) return m[0];
    m = t.match(/\b\d{2}[-\/]\d{2}[-\/]20\d{2}\b/);
    if(m) return m[0];
    return null;
  }

  const employer = findEmployer();
  const iban = findIBAN();
  const period = findPeriod();

  if(docId==='salary_slips'){
    const gross = findLabeled(['bruto','gross']);
    const net = findLabeled(['netto','net pay','net salary','net te betalen']);
    if(gross) found['Monthly Income'] = fmtMoney(Math.round(gross));
    else if(net) found['Monthly Income'] = fmtMoney(Math.round(net/0.748)); // estimate gross from net
    else if(amounts.length){ found['Monthly Income'] = fmtMoney(Math.round(Math.max(...amounts))); }
    if(net) found['Net Pay'] = fmtMoney(Math.round(net));
    if(employer) found['Employer'] = employer;
    if(period) found['Period'] = period;
  }
  else if(docId==='employment_contract'){
    const sal = findLabeled(['bruto','gross','salary','salaris']);
    if(sal) found['Monthly Income'] = fmtMoney(Math.round(sal));
    else if(amounts.length) found['Monthly Income'] = fmtMoney(Math.round(Math.max(...amounts)));
    if(employer) found['Employer'] = employer;
    if(/permanent|onbepaalde tijd|vast/i.test(t)) found['Contract Type'] = 'Permanent';
    else if(/temporary|bepaalde tijd|tijdelijk/i.test(t)) found['Contract Type'] = 'Temporary';
  }
  else if(docId==='bank_statements'){
    const bal = findLabeled(['closing balance','eindsaldo','balance','saldo']);
    if(bal) found['Closing Balance'] = fmtMoney(Math.round(bal));
    else if(amounts.length) found['Closing Balance'] = fmtMoney(Math.round(amounts[amounts.length-1]));
    if(iban) found['IBAN'] = iban;
    if(period) found['Statement Period'] = period;
  }
  else if(docId==='savings_statement'){
    // Look for an explicitly labelled current balance first
    let bal = findLabeled(['current savings balance','huidige saldo','current balance','spaarsaldo']);
    if(!bal){
      // Otherwise take the largest € amount, but exclude common non-balance figures
      // (deposit guarantee €100,000, interest rates) by filtering them out
      const filtered = amounts.filter(a=> a!==100000 && a>50);
      if(filtered.length) bal = Math.max(...filtered);
    }
    if(bal) found['Savings Balance'] = fmtMoney(Math.round(bal));
    if(iban) found['IBAN'] = iban;
  }
  else if(docId==='student_debt'){
    const bal = findLabeled(['outstanding','openstaand','debt','schuld','balance']);
    if(bal) found['Student Debt'] = fmtMoney(Math.round(bal));
    else if(amounts.length) found['Student Debt'] = fmtMoney(Math.round(Math.max(...amounts)));
  }
  else if(docId==='personal_loans'){
    const bal = findLabeled(['outstanding','balance','schuld','saldo']);
    if(bal!==null) found['Loan Balance'] = fmtMoney(Math.round(bal));
    else if(amounts.length) found['Loan Balance'] = fmtMoney(Math.round(Math.max(...amounts)));
  }
  else if(docId==='identity_document'){
    if(/passport|paspoort/i.test(t)) found['Document Type']='Passport';
    else if(/identity|identiteit|id card|idkaart/i.test(t)) found['Document Type']='ID Card';
    const exp = t.match(/(?:expir|verval|valid until|geldig tot)[^\d]{0,15}(\d{2}[-\/ ]\w{2,4}[-\/ ]20\d{2}|\d{2}[-\/]\d{2}[-\/]20\d{2}|20\d{2})/i);
    if(exp) found['Expiry']=exp[1];
  }
  else if(docId==='annual_accounts'){
    if(amounts.length) found['Annual Income'] = fmtMoney(Math.round(Math.max(...amounts)));
    if(employer) found['Business Name'] = employer;
  }
  else if(docId==='tax_returns'){
    const inc = findLabeled(['taxable','belastbaar','income','inkomen']);
    if(inc) found['Taxable Income'] = fmtMoney(Math.round(inc));
    else if(amounts.length) found['Taxable Income'] = fmtMoney(Math.round(Math.max(...amounts)));
  }
  else if(docId==='business_financials'){
    if(amounts.length) found['Revenue'] = fmtMoney(Math.round(Math.max(...amounts)));
    if(/profit|winst/i.test(t)) found['Status']='Profitable';
  }

  return {found, hasText:true, period};
}

// ── CONTENT CLASSIFIER ───────────────────────────────────────────────────────
// Decides, from the document's actual text + filename, what this document is and
// whether it belongs in this slot. Returns {verdict, confidence, reason}.
// Verdicts: 'verified' | 'wrong' | 'unreadable' | 'outdated' | 'needs_review' | 'unsupported'

// Keyword fingerprints for each document type (used to recognise content)
const DOC_FINGERPRINTS = {
  salary_slips:        {must:/salar|loonstrook|loonstrok|payslip|wage slip|salaris|bruto|netto|loonheffing/i, label:'salary slip'},
  employment_contract: {must:/employment (agreement|contract)|arbeidsovereenkomst|arbeidscontract|dienstverband|appointment letter|terms of employment/i, label:'employment contract'},
  bank_statements:     {must:/bank statement|rekeningafschrift|account statement|opening balance|closing balance|beginsaldo|eindsaldo|statement period/i, label:'bank statement'},
  savings_statement:   {must:/savings|spaarrekening|spaaroverzicht|saving account|spaarsaldo|savings balance|deposit account/i, label:'savings statement'},
  student_debt:        {must:/student (debt|loan|finance)|duo|studieschuld|studielening|leenoverzicht|study loan|tuition loan/i, label:'student debt statement'},
  personal_loans:      {must:/personal loan|consumer credit|persoonlijke lening|doorlopend krediet|loan statement|credit agreement|leningoverzicht/i, label:'personal loan statement'},
  identity_document:   {must:/passport|paspoort|identity card|identiteitskaart|id card|nationality|nationaliteit|date of birth|machine readable|koninkrijk der nederlanden|document no/i, label:'ID document'},
  annual_accounts:     {must:/annual accounts|jaarrekening|jaarcijfers|balance sheet|balans|profit and loss|financial statements/i, label:'annual accounts'},
  tax_returns:         {must:/tax return|belastingaangifte|belastingaanslag|aangifte inkomstenbelasting|taxable income|belastbaar inkomen|income tax assessment/i, label:'tax return'},
  business_financials: {must:/profit (and|&) loss|balance sheet|cash flow|winst en verlies|balans|resultatenrekening|revenue|omzet|financial statement/i, label:'business financials'},
};

// Strong signals that a document is something ELSE entirely (wrong upload)
const WRONG_CONTENT = [
  {re:/booking confirmation|reservation|boarding pass|airline|hotel|check-?in|departure|itinerary|vacation|holiday/i, what:'a travel or booking document'},
  {re:/rental agreement|tenancy agreement|huurovereenkomst|huurcontract|lease agreement|landlord|verhuurder|monthly rent|maandelijkse huur/i, what:'a rental/tenancy agreement'},
  {re:/energy bill|utility bill|energierekening|electricity|gas usage|water usage|meter reading|meterstand/i, what:'a utility bill'},
  {re:/insurance policy|verzekeringspolis|policy number|premium|dekking|coverage|aansprakelijkheid/i, what:'an insurance document'},
  {re:/invoice|factuur|receipt|order confirmation|webshop|bestelnummer|order number|amount due/i, what:'an invoice or receipt'},
  {re:/prescription|patient|huisarts|ziekenhuis|diagnosis|apotheek/i, what:'a medical document'},
  {re:/\bmenu\b|recipe/i, what:'a menu or restaurant document'},
];

function classifyDocument(docId, file, text){
  const name = (file.name||'').toLowerCase();
  const ext = name.split('.').pop();
  const okExt = ['pdf','png','jpg','jpeg','doc','docx'];

  // 1) Unsupported file type
  if(!okExt.includes(ext)){
    return {verdict:'unsupported', confidence:1, reason:'This file type is not supported. Please upload a PDF, JPG or PNG.'};
  }

  const hasText = !!(text && text.trim().length>40);
  const t = hasText ? text : '';

  // 2) If we DID read text, classify by content
  if(hasText){
    const fp = DOC_FINGERPRINTS[docId];

    // 2a) Does the content clearly match a DIFFERENT, non-mortgage document?
    for(const w of WRONG_CONTENT){
      if(w.re.test(t)){
        if(!(fp && fp.must.test(t))){
          return {verdict:'wrong', confidence:0.9, reason:'This looks like '+w.what+', which is not relevant for a mortgage application. Please upload the correct document for this field.'};
        }
      }
    }

    // 2b) Score every document type by how strongly its fingerprint matches,
    //     then see which type fits best. This prevents e.g. a bank statement
    //     (which mentions "salaris") being accepted in the salary-slip slot.
    const scores = {};
    for(const [otherId, ofp] of Object.entries(DOC_FINGERPRINTS)){
      const matches = (t.match(new RegExp(ofp.must.source, 'gi'))||[]).length;
      scores[otherId] = matches;
    }
    const thisScore = scores[docId] || 0;
    let bestId = docId, bestScore = thisScore;
    for(const [id,sc] of Object.entries(scores)){
      if(sc > bestScore){ bestScore = sc; bestId = id; }
    }

    // 2c) If another document type clearly fits much better, it's the wrong slot
    if(bestId !== docId && bestScore >= thisScore + 2){
      const lbl = DOC_FINGERPRINTS[bestId].label;
      return {verdict:'wrong', confidence:0.85, reason:'This looks like a '+lbl+', not the document expected here ('+DOC_META[docId].label.toLowerCase()+'). Please upload it in the correct field.'};
    }

    // 2d) Does the content match THIS slot's expected type at all?
    if(fp && thisScore>0){
      if(docId==='salary_slips' && isOutdatedByText(t)){
        return {verdict:'outdated', confidence:0.8, reason:'This salary slip appears older than the standard verification period (most recent 3 months). Please upload a more recent one.'};
      }
      return {verdict:'verified', confidence:0.9, reason:null};
    }

    // 2e) Readable but matches a different slot (any score) → wrong
    if(bestId !== docId && bestScore>0){
      const lbl = DOC_FINGERPRINTS[bestId].label;
      return {verdict:'wrong', confidence:0.8, reason:'This looks like a '+lbl+', not the document expected here ('+DOC_META[docId].label.toLowerCase()+'). Please upload it in the correct field.'};
    }

    // 2f) Readable but unrecognised → needs manual review (do NOT fabricate data)
    return {verdict:'needs_review', confidence:0.4, reason:'Silta read this document but could not confirm it is a '+DOC_META[docId].label.toLowerCase()+'. A mortgage advisor will review it manually.'};
  }

  // 3) No readable text (scan, photo, or PDF.js unavailable)
  const fnVerdict = classifyByFilename(docId, name);
  if(fnVerdict.verdict==='wrong' || fnVerdict.verdict==='unsupported') return fnVerdict;
  if(fnVerdict.verdict==='verified'){
    return {verdict:'needs_review', confidence:0.3, reason:'Silta could not read text from this file (it may be a scan or photo), so it could not automatically verify the contents. A mortgage advisor will review it. Tip: upload a text-based PDF for automatic verification.'};
  }
  return {verdict:'unreadable', confidence:0.5, reason:'The uploaded document could not be analyzed automatically. Please upload a clear, text-based PDF, or a mortgage advisor will review it manually.'};
}

function isOutdatedByText(t){
  const years = (t.match(/\b(20\d{2})\b/g)||[]).map(Number);
  if(!years.length) return false;
  const newest = Math.max(...years);
  const nowYear = new Date().getFullYear();
  return newest < nowYear - 1;
}

function classifyByFilename(docId, name){
  const wrong = [
    /vacation|holiday|ticket|flight|hotel|booking|reservation|airbnb|ibiza|trip/,
    /rental|huur|lease|tenancy|verhuur|huurcontract|huurovereenkomst/,
    /utility|energie|stroom|water_bill|internet_bill|energierekening|ziggo|eneco|essent/,
    /verzekering|insurance|polis/,
    /medisch|huisarts|ziekenhuis|hospital|medical|prescription/,
    /factuur|invoice|receipt|webshop|bol_com|order/,
    /menu|recipe|restaurant/,
  ];
  for(const re of wrong){ if(re.test(name)) return {verdict:'wrong', confidence:0.6, reason:'Based on the file name, this does not appear to be a '+DOC_META[docId].label.toLowerCase()+' and may not be relevant for a mortgage application. Please check you uploaded the correct file.'}; }

  const expects = {
    salary_slips:        /salar|loonstrook|loon|payslip|wage|salaris/,
    employment_contract: /contract|arbeids|employment|overeenkomst|dienstverband/,
    bank_statements:     /bank|statement|afschrift|rekening|transactie/,
    savings_statement:   /saving|spaar|spaarrekening|deposit/,
    student_debt:        /student|duo|studie|studieschuld|study/,
    personal_loans:      /loan|lening|krediet|credit/,
    identity_document:   /passport|paspoort|id_|identiteit|idcard|identity/,
    annual_accounts:     /annual|jaarrekening|accounts|jaarcijfers/,
    tax_returns:         /tax|belasting|aanslag|aangifte/,
    business_financials: /financial|profit|balans|resultaten/,
  };
  const pattern = expects[docId];
  if(pattern && pattern.test(name)) return {verdict:'verified', confidence:0.5, reason:null};
  return {verdict:'unrecognized', confidence:0.2, reason:null};
}

function mergeExtraction(target, incoming){
  Object.entries(incoming).forEach(([k,v])=>{
    if(!(k in target)) target[k]=v;
  });
  return target;
}

async function handleFileInput(docId, fileList){
  if(!fileList || !fileList.length) return;
  const files = Array.from(fileList);
  const multi = allowsMultiple(docId);
  const before = computeReadiness();

  const doc = state.documents[docId];
  doc.status='analyzing';
  doc.note=null;
  if(state.page==='documents') renderDocuments();

  const analyzed = [];
  for(const file of files){
    const text = await readPdfText(file);
    analyzed.push({file, text});
  }

  setTimeout(()=> finishAnalysisMulti(docId, analyzed, before, multi), 900+Math.random()*700);
}

const SCENARIO_NOTES = {
  wrong:'This document does not appear relevant for a mortgage application.',
  unrecognized:'Silta could not confirm this is the expected document type from the file. A mortgage advisor will need to review it manually.',
  duplicate:'This document appears to have already been uploaded.',
  outdated:'This document appears older than the standard verification period.',
  incomplete:'This document appears incomplete. Please upload the full document.',
  unreadable:'The uploaded document could not be analyzed. Please try a clearer scan or photo.',
  unsupported:'This file type is not supported. Please upload a PDF, JPG or PNG.',
  needs_review:'A discrepancy was detected between uploaded documents. Your advisor will need to review this.'
};

// Build the combined extracted object + per-file status for a document, using
// already-read text content where available.
function recomputeDocExtraction(docId){
  const doc = state.documents[docId];
  let combined = {};
  let anyReal = false;
  doc.files.forEach((f)=>{
    if(f.text && f.text.trim().length>40){
      const parsed = parseDocumentContent(docId, f.text);
      if(Object.keys(parsed.found).length){ anyReal=true; mergeExtraction(combined, parsed.found); }
      if(parsed.period && !f.period) f.period=parsed.period;
    }
  });
  // IMPORTANT: never fabricate figures. If nothing was read from content,
  // leave extracted empty rather than inventing numbers.
  doc.extracted = combined;
  doc.extractedFromContent = anyReal;
}

// Aggregate per-file verdicts into one document status (worst-case wins, but
// 'verified' only if at least one file verified and none are wrong/unreadable).
function aggregateVerdict(verdicts){
  const order = ['unsupported','wrong','unreadable','outdated','needs_review','verified'];
  // pick the most severe verdict present
  for(const v of order){
    if(verdicts.includes(v)) return v;
  }
  return 'needs_review';
}

function finishAnalysisMulti(docId, analyzed, before, multi){
  const meta = DOC_META[docId];
  const doc = state.documents[docId];

  // Classify each file independently by its actual content
  const perFile = analyzed.map(a=>({
    file:a.file, text:a.text, result:classifyDocument(docId, a.file, a.text)
  }));

  // Push each file with its individual verdict
  perFile.forEach(pf=>{
    doc.files.push(fileEntry(pf.file, pf.text, pf.result.verdict));
  });

  // Aggregate to a document-level status
  const verdicts = perFile.map(pf=>pf.result.verdict);
  const status = aggregateVerdict(verdicts);
  doc.status = status;

  // Choose a representative note from the most severe file
  const severe = perFile.find(pf=>pf.result.verdict===status);
  doc.note = severe && severe.result.reason ? severe.result.reason : null;

  // Extract figures ONLY from files that were actually verified/recognised
  // and had readable content. Never invent numbers.
  if(status==='verified' || status==='outdated' || status==='needs_review'){
    recomputeDocExtraction(docId);
  } else {
    doc.extracted = {};
    doc.extractedFromContent = false;
  }

  doc.fileName = doc.files.length ? doc.files[doc.files.length-1].name : null;

  // Cross-check income conflict between salary slip & contract (content-based)
  checkIncomeConflict();

  const after = computeReadiness();
  const n = analyzed.length;

  if(status==='verified'){
    const stillMissing = missingRequiredDocs();
    let msg = 'I analyzed '+(n>1? ('your '+n+' '+meta.label.toLowerCase()+' files') : ('your '+meta.label.toLowerCase()))+' and confirmed '+(n>1?'they are':'it is')+' the right document type. ';
    if(doc.extractedFromContent && Object.keys(doc.extracted).length){
      const k0 = Object.keys(doc.extracted)[0];
      msg += 'I read '+(k0.toLowerCase())+' of '+doc.extracted[k0]+' directly from the document. ';
    }
    msg += stillMissing.length ? (stillMissing.length===1? DOC_META[stillMissing[0]].label+' is still required.' : stillMissing.slice(0,2).map(i=>DOC_META[i].label).join(' and ')+' are still required.') : 'All required documents are now uploaded.';
    pushProactive(msg);
  } else if(status==='outdated'){
    pushProactive('The '+meta.label.toLowerCase()+' you uploaded appears older than the standard verification period. Please upload a more recent version when you can.');
  } else if(status==='wrong'){
    pushProactive('The file you uploaded for '+meta.label.toLowerCase()+' does not appear to be the right document. '+(doc.note||'')+' I have not recorded any figures from it.');
  } else if(status==='unreadable' || status==='unsupported'){
    pushProactive('I could not analyze the file you uploaded for '+meta.label.toLowerCase()+'. '+(doc.note||''));
  } else {
    pushProactive('I have logged your upload for '+meta.label.toLowerCase()+', but could not fully verify it automatically. A mortgage advisor will take a look.');
  }

  if(after!==before){
    pushProactive('Your readiness score '+(after>before?'increased':'changed')+' from '+before+'% to '+after+'%. '+readinessHint(after));
  }

  if(state.page==='documents') renderDocuments();
  if(state.page==='dashboard') renderDashboard();
  renderTopbar();
  if(state.page==='assistant') renderAssistant();
}

function fileEntry(file, text, status){
  return { name:file.name, size:file.size, sizeLabel:fileSizeLabel(file.size), text:text||'', status:status, period:null };
}

function checkIncomeConflict(){
  const a = state.documents['salary_slips'], b = state.documents['employment_contract'];
  if(!a || !b) return;
  const ai = a.extracted && a.extracted['Monthly Income'] ? parseInt(String(a.extracted['Monthly Income']).replace(/[^\d]/g,'')) : null;
  const bi = b.extracted && b.extracted['Monthly Income'] ? parseInt(String(b.extracted['Monthly Income']).replace(/[^\d]/g,'')) : null;
  if(ai && bi && Math.abs(ai-bi)>=500){
    if(a.status==='verified') { a.status='needs_review'; a.note=SCENARIO_NOTES.needs_review; }
    if(b.status==='verified') { b.status='needs_review'; b.note=SCENARIO_NOTES.needs_review; }
  }
}

function readinessHint(score){
  if(score>=90) return 'Your application looks ready for advisor review.';
  if(score>=70) return 'Uploading your remaining documents would prepare your application for advisor review.';
  if(score>=40) return 'A few more documents would meaningfully move your application forward.';
  return 'Uploading your income and identity documents is the fastest way to make progress.';
}

function sendMessage(){
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if(!text) return;
  input.value='';
  state.conversation.push({id:uid(), role:'user', content:text, time:new Date()});
  renderAssistant();
  typingActive = true;
  renderAssistant();
  callSilta(text).then(reply=>{
    typingActive = false;
    state.conversation.push({id:uid(), role:'assistant', content:reply, time:new Date(), suggestAdvisor: ADVISOR_TRIGGER_RE.test(text)});
    updateSuggestions(text);
    renderAssistant();
    if(state.page==='dashboard') renderDashboard();
  }).catch(err=>{
    console.warn('callSilta failed entirely, using local answer:', err);
    typingActive = false;
    let reply;
    try { reply = localAnswer(text, searchKB(text,4)); }
    catch(e){ reply = "I can help with mortgage questions, your documents, and your readiness score. Please try asking again, or use Contact advisor for direct help."; }
    state.conversation.push({id:uid(), role:'assistant', content:reply, time:new Date(), suggestAdvisor: ADVISOR_TRIGGER_RE.test(text)});
    renderAssistant();
    if(state.page==='dashboard') renderDashboard();
  });
}

function searchKB(query, topK){
  topK = topK||4;
  const q = query.toLowerCase();
  const words = q.split(/[^a-z0-9€]+/i).filter(w=>w.length>2);
  const scored = KB.map(item=>{
    const hay = (item.q+' '+item.a+' '+item.t.join(' ')).toLowerCase();
    let score=0;
    words.forEach(w=>{ if(hay.indexOf(w)>=0) score+=1; });
    item.t.forEach(tag=>{ if(q.indexOf(tag)>=0) score+=2; });
    return {item,score};
  });
  scored.sort((a,b)=>b.score-a.score);
  let top = scored.filter(s=>s.score>0).slice(0,topK).map(s=>s.item);
  if(top.length===0) top = [KB[0], KB.find(k=>k.c==='platform')];
  return top;
}

  verified.forEach(id=>{

async function callSilta(userText){
  const kbMatches = searchKB(userText, 4);
  const kbBlock = kbMatches.map(k=>'Q: '+k.q+'\nA: '+k.a).join('\n\n');
  const systemPrompt = [
'You are Silta, an AI mortgage assistant embedded in a Dutch mortgage origination platform. You act as a mortgage educator, application guide, and document assistant for the customer currently logged in.',
'',
'You operate on a hybrid AI + human model: you handle education, guidance, document-readiness tracking and general application support. A human mortgage advisor always handles final review, validation, compliance and any final mortgage recommendation. Make this division clear whenever relevant.',
'',
'SAFETY RULES — follow these strictly:',
'- Never guarantee mortgage approval, claim affordability certainty, or claim the customer is "qualified".',
'- Never provide final mortgage advice or replace the mortgage advisor.',
'- When discussing affordability, eligibility or recommendations, use grounding language such as "Based on the information currently available…", "This may indicate…", "A mortgage advisor will validate…", or "This is guidance rather than formal mortgage advice…".',
'- Always reference the customer\'s actual uploaded information when available, and be explicit when information is missing rather than inventing it.',
'- If the customer has no relevant documents uploaded for a question about affordability or readiness, say you do not have enough information yet and explain what would help.',
'- If the customer expresses anxiety or worry about approval, be reassuring and factual without making promises — note that many applications require additional review and that this is normal.',
'- Keep responses concise and conversational (roughly 2-5 sentences) unless the question genuinely requires more detail.',
'- Do not use markdown formatting like asterisks or headers; write in plain conversational prose suitable for a chat bubble.',
'',
'RELEVANT MORTGAGE KNOWLEDGE BASE ENTRIES (use these as grounding, paraphrase naturally, do not just repeat them verbatim):',
kbBlock,
'',
buildContextBlock()
].join('\n');

  const history = state.conversation.slice(-10).filter(m=>!m.proactive).map(m=>({role:m.role, content:m.content}));
  history.push({role:'user', content:userText});

  const key = (state.apiKey||'').trim();

  // 1) If the user supplied an OpenAI key, use the OpenAI Chat Completions API.
  if(key.startsWith('sk-')){
    try{
      const resp = await fetch('https://api.openai.com/v1/chat/completions', {
        method:'POST',
        headers:{'Content-Type':'application/json', 'Authorization':'Bearer '+key},
        body: JSON.stringify({
          model: state.aiModel || 'gpt-4o-mini',
          max_tokens: 600,
          temperature: 0.5,
          messages: [{role:'system', content:systemPrompt}, ...history]
        })
      });
      if(!resp.ok){ const e = await resp.json().catch(()=>({})); throw new Error((e.error&&e.error.message)||('OpenAI error '+resp.status)); }
      const data = await resp.json();
      const out = data.choices && data.choices[0] && data.choices[0].message && data.choices[0].message.content;
      if(out) return out.trim();
      throw new Error('Empty response from OpenAI');
    }catch(err){
      console.warn('OpenAI call failed, using local answer:', err);
    }
  }

  // 2) Try the Anthropic endpoint (works inside the claude.ai artifact preview).
  try{
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ model:'claude-sonnet-4-6', max_tokens:1000, system: systemPrompt, messages: history })
    });
    if(resp.ok){
      const data = await resp.json();
      if(data && data.content){
        const out = data.content.map(b=>b.text||'').filter(Boolean).join('\n').trim();
        if(out) return out;
      }
    }
  }catch(err){
    console.warn('Anthropic endpoint unavailable (expected outside claude.ai); using local answer.');
  }

  // 3) Always-works fallback: grounded local answer from KB + profile/documents.
  return localAnswer(userText, kbMatches);
}

// Generate a helpful, grounded reply with no external API — keeps the demo
// working anywhere (GitHub Pages, opened file, offline). Uses the same KB + context.
function localAnswer(userText, kbMatches){
  const q = userText.toLowerCase();
  const r = computeReadiness();
  const missing = missingRequiredDocs().map(id=>DOC_META[id].label);
  const verified = activeDocIds().filter(docVerified).map(id=>DOC_META[id].label);

  function extractedValue(docId, field){
    const d = state.documents[docId];
    return d && d.extracted && d.extracted[field] ? d.extracted[field] : null;
  }
  const income = extractedValue('salary_slips','Monthly Income') || extractedValue('employment_contract','Monthly Income');
  const savings = extractedValue('savings_statement','Savings Balance');

  if(/missing|still need|what.*(documents|docs)|readiness|ready|how far|complete/.test(q)){
    let msg = 'Based on the information currently available, your application readiness is '+r+'%. ';
    if(verified.length) msg += 'You have verified: '+verified.join(', ')+'. ';
    if(missing.length) msg += 'Still required: '+missing.join(', ')+'. ';
    else msg += 'All required documents have been uploaded. ';
    msg += 'A mortgage advisor will validate everything before any final decision.';
    return msg;
  }

  if(/afford|how much.*(borrow|mortgage)|can i buy|budget|350|400|house price|property value/.test(q)){
    if(!income){
      return 'I currently do not have enough information to give you personalised affordability guidance. If you upload your income and financial documents, I can give a more tailored picture. As a general rule, lenders look at roughly 4 to 5.5 times your gross annual income, but a mortgage advisor will validate your full situation before any figure is confirmed.';
    }
    let msg = 'Based on the information currently available — a monthly income of '+income+(savings?(' and savings of '+savings):'')+' — this may be within a realistic range for many lenders. ';
    msg += 'However, affordability depends on additional factors such as existing debt, interest rates, employment stability and lender requirements. This is guidance rather than formal mortgage advice, and a mortgage advisor will validate your complete financial situation.';
    return msg;
  }

  if(/which.*(mortgage|fits|suit|better|recommend)|annuity or linear|should i (choose|pick|take)/.test(q)){
    let msg = 'An annuity mortgage keeps monthly payments relatively stable, while a linear mortgage starts higher and decreases over time, with less total interest paid overall. ';
    if(income) msg += 'Based on your uploaded income information'+(docVerified('employment_contract')?' and stable employment contract':'')+', an annuity mortgage may offer more predictable monthly costs. ';
    msg += 'This is guidance rather than formal mortgage advice — a mortgage advisor will review your complete financial situation before any final recommendation is made.';
    return msg;
  }

  if(/worried|anxious|scared|afraid|stress|won.?t get|reject|nervous|will i be approved/.test(q)){
    let msg = 'It is completely normal to feel that way — many applications require additional review before a decision can be made, and that does not mean anything is wrong. ';
    msg += 'Based on your current profile, your application appears to be progressing normally'+(r>=50?', and your readiness score of '+r+'% is a good sign':'')+'. ';
    msg += 'Your mortgage advisor is there to support you through the parts that need a human eye.';
    return msg;
  }

  if(/advisor|human|speak to someone|call|callback|contact/.test(q)){
    return 'You can reach your assigned advisor, '+state.advisor.name+', any time using the Contact advisor button. They handle final review, validation, and any formal mortgage recommendation. Would you like to send them a message or request a callback?';
  }

  if(kbMatches && kbMatches.length){
    const top = kbMatches[0];
    let msg = top.a;
    if(kbMatches[1] && kbMatches[1].c===top.c){ msg += ' '+kbMatches[1].a; }
    msg += ' If you would like, a mortgage advisor can go into more detail for your specific situation.';
    return msg;
  }

  return 'I can help with mortgage concepts, your required documents, your readiness score, and general affordability guidance. Try asking me something like "what documents am I missing?" or "what is the difference between annuity and linear mortgages?" A mortgage advisor is also available any time for anything that needs a human eye.';
}

const SUGGESTION_POOL = {
  basics:["What is NHG and how does it work?","What does loan-to-value mean?","What's the difference between gross and net mortgage cost?"],
  products:["What's the difference between annuity and linear mortgages?","What is a fixed interest rate period?","Can I combine different mortgage types?"],
  process:["What happens during advisor review?","How long does the mortgage process usually take?","What does the AI review actually check?"],
  documents:["What documents am I still missing?","How recent do my bank statements need to be?","What documents do self-employed applicants need?"],
  affordability:["Can I afford my target property?","How does existing debt affect affordability?","What should I do next to improve my readiness score?"],
  platform:["What does my readiness score mean?","Can the AI approve my mortgage?","When should I contact my advisor directly?"]
};
function updateSuggestions(lastText){
  const matches = searchKB(lastText,2);
  const cats = Array.from(new Set(matches.map(m=>m.c)));
  let pool = [];
  cats.forEach(c=>{ if(SUGGESTION_POOL[c]) pool = pool.concat(SUGGESTION_POOL[c]); });
  if(pool.length<3){ Object.values(SUGGESTION_POOL).forEach(arr=>pool=pool.concat(arr)); }
  pool = Array.from(new Set(pool)).filter(p=>p.toLowerCase()!==lastText.toLowerCase());
  state.suggestions = pool.slice(0,4);
}
